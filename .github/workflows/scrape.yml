name: Scrape DOE Fuel Prices

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: pip install requests beautifulsoup4 pdfplumber lxml

      - name: Run Scraper
        # This command checks if the file exists before running it
        run: |
          if [ -f scraper.py ]; then python scraper.py; 
          elif [ -f scrapper.py ]; then python scrapper.py; 
          else echo "Error: No scraper file found!"; exit 1; fi
        
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p data
          if [ -f data/prices.json ]; then
            git add data/prices.json
