name: Scrape DOE Fuel Prices

on:
  schedule:
    - cron: '0 2 * * *' # Runs daily at 10 AM Manila Time
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write # THIS IS CRITICAL
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: pip install requests beautifulsoup4 pdfplumber
        
      - name: Run Scraper
        run: python scraper.py
        
      - name: Save Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.json
          git commit -m "Update fuel prices: $(date)" || echo "No changes"
          git push
